# Development environment — infrastructure services only
# Backend: python3 -m uvicorn backend.app.main:app --port 5380
# Frontend: cd frontend && npm run dev
# Worker: python3 -m workers.run

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langchat}
      POSTGRES_DB: ${POSTGRES_DB:-mallsenseai}
    volumes:
      - mallsenseai_dev_pgdata:/var/lib/postgresql/data

volumes:
  mallsenseai_dev_pgdata:
