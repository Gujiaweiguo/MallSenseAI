services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mallsenseai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mallsenseai}
      POSTGRES_DB: ${POSTGRES_DB:-mallsenseai}
    volumes:
      - ${DATA_DIR:-/var/lib/mallsenseai}/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mallsenseai} -d ${POSTGRES_DB:-mallsenseai}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mallsenseai}:${POSTGRES_PASSWORD:-mallsenseai}@postgres:5432/${POSTGRES_DB:-mallsenseai}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-/var/lib/mallsenseai}/assets:/app/data/assets
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5380/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "workers.run"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mallsenseai}:${POSTGRES_PASSWORD:-mallsenseai}@postgres:5432/${POSTGRES_DB:-mallsenseai}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-/var/lib/mallsenseai}/assets:/app/data/assets
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - ${HOST_PORT:-80}:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

networks:
  internal:
    driver: bridge
