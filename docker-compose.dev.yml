services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mallsenseai-postgres-dev
    environment:
      POSTGRES_DB: mallsenseai
      POSTGRES_USER: mallsenseai
      POSTGRES_PASSWORD: mallsenseai
    ports:
      - "5432:5432"
    volumes:
      - mallsenseai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mallsenseai -d mallsenseai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mallsenseai-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - mallsenseai-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mallsenseai-postgres-data:
  mallsenseai-redis-data:
